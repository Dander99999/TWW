<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login as Admin</title>
    <link rel="stylesheet" href="Settings_Login_as_admin.css">
</head>
<body>
    <div class="login-container">
        
        <div class="page-header">Login as admin</div>
        
        <div class="login-form-section">
            <h3>Account</h3>
            <form id="adminLoginForm" action="#" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@example.com" required>
                </div>
                    
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                    
                <div class="form-group">
                    <label for="key">Key</label>
                    <input type="password" id="key" name="key" placeholder="Enter your security key" required>
                </div>
                    
                <button type="submit" class="submit-button">Authorization</button>
            </form>
        </div>
    </div>
</body>
</html>
