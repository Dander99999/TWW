    <div class="controls">
        <button onclick="z(0.1)">+</button>
        <button onclick="z(-0.1)">-</button>
        <button onclick="r()">↺</button>
    </div>
    
    <div class="hint">Зажмите для перемещения • Колесико для масштаба</div>

    <script>
        let s=1, x=0, y=0, d=false, lx, ly, m=document.getElementById('map');
        
        function z(v){ s=Math.max(0.3,Math.min(5,s+v)); u(); }
        function r(){ s=1; x=y=0; u(); }
        function u(){ m.style.transform=`translate(${x}px,${y}px) scale(${s})`; }
        
        document.addEventListener('mousedown',e=>{
            if(e.button===0){ d=true; lx=e.clientX; ly=e.clientY; document.body.style.cursor='grabbing'; }
        });
        
        document.addEventListener('mousemove',e=>{
            if(!d) return;
            x+=e.clientX-lx; y+=e.clientY-ly;
            lx=e.clientX; ly=e.clientY; u();
        });
        
        document.addEventListener('mouseup',()=>{
            d=false; document.body.style.cursor='grab';
        });
        
        document.addEventListener('wheel',e=>{
            e.preventDefault();
            let os=s;
            s+=e.deltaY>0?-0.1:0.1;
            s=Math.max(0.3,Math.min(5,s));
            let sc=s-os;
            x-=(e.clientX-x)*sc;
            y-=(e.clientY-y)*sc;
            u();
        });
        
        window.addEventListener('load',()=>{
            x=(window.innerWidth-4160)/2;
            y=(window.innerHeight-1606)/2;
            u();
        });

        let initialDistance = 0;
        let initialScale = 1;
        
        m.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                d = true;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                initialScale = s;
                initialDistance = getDistance(
                    e.touches[0].clientX, e.touches[0].clientY,
                    e.touches[1].clientX, e.touches[1].clientY
                );
            }
        });
        
        m.addEventListener('touchmove', function(e) {
            e.preventDefault();
            
            if (e.touches.length === 1 && d) {
                x += e.touches[0].clientX - lx;
                y += e.touches[0].clientY - ly;
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
                u();
            } else if (e.touches.length === 2) {
                const currentDistance = getDistance(
                    e.touches[0].clientX, e.touches[0].clientY,
                    e.touches[1].clientX, e.touches[1].clientY
                );
                
                if (initialDistance > 0) {
                    const scaleChange = currentDistance / initialDistance;
                    s = initialScale * scaleChange;
                    s = Math.max(0.3, Math.min(5, s));
                    u();
                }
            }
        });
        
        m.addEventListener('touchend', function() {
            d = false;
            initialDistance = 0;
        });
        
        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }
    </script>
